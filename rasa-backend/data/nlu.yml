- intent: stress_deadline_el
  examples: |
    - Φοβάμαι ότι έχασα την προθεσμία, τι να κάνω;
    - Άγχος με τις προθεσμίες, πρόλαβα;
    - Έχω αγχωθεί, έχασα την ημερομηνία για τις αιτήσεις;
    - Ανησυχώ μήπως έκλεισαν οι αιτήσεις

- intent: stress_deadline_en
  examples: |
    - I'm afraid I missed the deadline, what should I do?
    - I'm stressed about the application deadline
    - Did I miss the date for applications?
    - I am worried that the deadline has passed

- intent: ask_contact_el
  examples: |
