version: "3.1"

rules:

# ==================== ΕΛΛΗΝΙΚΟΙ ΚΑΝΟΝΕΣ ====================

- rule: Say goodbye anytime the user says goodbye (GR)
  steps:
  - intent: goodbye_el
  - action: utter_goodbye_el

- rule: Εμφάνιση Στοιχείων Επικοινωνίας - Ελληνικά
  steps:
  - intent: ask_contact_el
  - action: utter_ask_contact_el
  - action: utter_anything_else_el

- rule: Απάντηση σε Ευχαριστώ - Ελληνικά
  steps:
  - intent: thankyou_el
  - action: utter_thankyou_el
  - action: utter_anything_else_el

- rule: Διαχείριση Προσβολής - Ελληνικά
  steps:
  - intent: insult_el
  - action: utter_insult_el
  - action: utter_anything_else_el

# ==================== ΑΓΓΛΙΚΟΙ ΚΑΝΟΝΕΣ ====================

- rule: Say goodbye anytime the user says goodbye (EN)
  steps:
  - intent: goodbye_en
  - action: utter_goodbye_en

- rule: Show Contact Details - English
  steps:
  - intent: ask_contact_en
  - action: utter_ask_contact_en
  - action: utter_anything_else_en

- rule: Respond to Thank You - English
  steps:
  - intent: thankyou_en
  - action: utter_thankyou_en
  - action: utter_anything_else_en

- rule: Handle Insult - English
  steps:
  - intent: insult_en
  - action: utter_insult_en
  - action: utter_anything_else_en

# ==================== FALLBACK ====================

- rule: Ενεργοποίηση Custom Fallback
  steps:
  - intent: nlu_fallback
  - action: action_custom_fallback

- rule: Αλλαγή γλώσσας σε Αγγλικά
  steps:
  - intent: change_lang_to_en
  - action: utter_change_lang_to_en

- rule: Αλλαγή γλώσσας σε Ελληνικά
  steps:
  - intent: change_lang_to_el
  - action: utter_change_lang_to_el

# ==================== ΔΙΚΛΙΔΕΣ ΑΣΦΑΛΕΙΑΣ ΓΙΑ ΣΚΕΤΑ ΝΑΙ/ΟΧΙ ====================

- rule: Διαχείριση generic affirm (GR)
  steps:
  - intent: affirm_el
  - action: utter_affirm_el

- rule: Διαχείριση generic deny (GR)
  steps:
  - intent: deny_el
  - action: utter_deny_el

- rule: Διαχείριση generic affirm (EN)
  steps:
  - intent: affirm_en
  - action: utter_affirm_en

- rule: Διαχείριση generic deny (EN)
  steps:
  - intent: deny_en
  - action: utter_deny_en